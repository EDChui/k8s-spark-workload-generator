seed: 42
delete_after_seconds: 60
status_poll_seconds: 10

scale: 1
queries:
  - q3-v2.4
  - q64-v2.4
  - q70-v2.4
  - q82-v2.4

workloads:
  - amount: 100
    iat_seconds: 60
  - amount: 200
    iat_seconds: 30
  - amount: 200
    iat_seconds: 15
  - amount: 200
    iat_seconds: 30
  - amount: 100
    iat_seconds: 60

# These metastore_dirs are used to solve the error "ERROR XSDB6: Another instance of Derby may have already booted the database /tpcds-data/metastore_db"
# This override the spark submit config's metastore_dir
metastore_dirs:
  - /tpcds-data/metastore_db_1
  - /tpcds-data/metastore_db_2
  - /tpcds-data/metastore_db_3
  - /tpcds-data/metastore_db_4
  - /tpcds-data/metastore_db_5
